services:
  - type: web
    name: librechat
    env: node
    region: singapore
    buildCommand: |
      npm install --legacy-peer-deps
      npm run frontend
    startCommand: npm run backend
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: MONGO_URI
        value: mongodb+srv://librechat_user:al-vyJ6-suCrDyk8mwEmSghmswaSm8hroMvOB3c-qNFiOI@cluster0.eyhfc.mongodb.net/LibreChat?retryWrites=true&w=majority
      # Redis optional - LibreChat can run without it
      # - key: REDIS_URL
      #   value: redis://localhost:6379
      - key: DOMAIN_CLIENT
        value: https://librechat.onrender.com
      - key: DOMAIN_SERVER
        value: https://librechat.onrender.com
      - key: NO_INDEX
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MEILI_MASTER_KEY
        generateValue: true
      - key: CREDS_KEY
        generateValue: true
      - key: CREDS_IV
        generateValue: true
